name: Release Assets

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag (e.g. v0.4.0)
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name || inputs.tag }}
  cancel-in-progress: true

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="${{ inputs.tag }}"
          fi
          if [ -z "$TAG" ]; then
            echo "::error::No release tag found. Push a v* tag or use workflow_dispatch with a tag input."
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Using tag: ${TAG} (version ${VERSION})"

      - name: Set version from release tag
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${{ steps.tag.outputs.version }}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "$TAG" ]; then
            echo "::error::Release tag must use a v-prefix (e.g. v0.4.0). Got: $TAG"
            exit 1
          fi
          jq --arg v "$VERSION" '.version = $v' src/module.json > src/module.json.tmp
          mv src/module.json.tmp src/module.json
          echo "Packaging claude-mod v${VERSION}"

      - name: Build module zip
        run: |
          mkdir -p dist/claude-mod
          cp -a src/. dist/claude-mod/
          (cd dist && zip -rq ../claude-mod.zip claude-mod)
          cp src/module.json module.json

      - name: Publish GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${{ steps.tag.outputs.version }}"
          NOTES_FILE="$(mktemp)"
          awk -v version="$VERSION" '
            /^## \[/ {
              if (found) exit
              if ($0 ~ "^## \\[" version "\\]") found = 1
              next
            }
            found && NF { print }
          ' src/CHANGELOG.md > "$NOTES_FILE" || true
          if [ ! -s "$NOTES_FILE" ]; then
            echo "See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/${TAG}/src/CHANGELOG.md) for release notes." > "$NOTES_FILE"
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" claude-mod.zip module.json --clobber
          else
            gh release create "$TAG" claude-mod.zip module.json \
              --title "Claude Mod ${VERSION}" \
              --notes-file "$NOTES_FILE" \
              --draft
          fi
