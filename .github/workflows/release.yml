name: Release Assets

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag (e.g. v0.3.0)
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name || inputs.tag }}
  cancel-in-progress: true

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="${{ inputs.tag }}"
          fi
          if [ -z "$TAG" ]; then
            echo "::error::No release tag found. Push a v* tag or use workflow_dispatch with a tag input."
            exit 1
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Using tag: ${TAG}"

      - name: Set version from release tag
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${TAG#v}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "$TAG" ]; then
            echo "::error::Release tag must use a v-prefix (e.g. v0.3.0). Got: $TAG"
            exit 1
          fi
          jq --arg v "$VERSION" '.version = $v' module.json > module.json.tmp
          mv module.json.tmp module.json
          echo "Packaging claude-mod v${VERSION}"

      - name: Build module zip
        run: |
          mkdir -p dist/claude-mod
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='dist' \
            --exclude='.cursor' \
            --exclude='.vscode' \
            --exclude='.idea' \
            --exclude='AGENTS.md' \
            --exclude='.gitignore' \
            --exclude='*.zip' \
            --exclude='.env' \
            --exclude='.env.*' \
            ./ dist/claude-mod/
          (cd dist && zip -rq ../claude-mod.zip claude-mod)

      - name: Publish GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" claude-mod.zip module.json --clobber
          else
            gh release create "$TAG" claude-mod.zip module.json --title "$TAG" --generate-notes
          fi
